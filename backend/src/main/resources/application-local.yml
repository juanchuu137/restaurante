spring:
  datasource:
    url: jdbc:h2:mem:restaurante;DB_CLOSE_DELAY=-1
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true

app:
  jwt:
    secret: mi-secret-local-super-seguro-1234567890abcdef
    expiration-hours: 24
